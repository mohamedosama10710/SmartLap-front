<section class="py-5 bg-light"  >

  <div class="d-flex flex-column align-items-start justify-content-center ms-4">
        <h4 class="fw-bold mb-1   m-auto  text-center  text-md-start  w-md-auto w-75">Add New Patient</h4>
      <p class="text-muted small m-auto  mb-4 text-center text-md-start w-md-auto w-75 align-self-baseline">
        View, manage, and validate patient diagnostic data in real-time
      </p>
  </div>

  <div class="container d-flex flex-md-column align-items-center " >
    <div class="row  shadow  add-patient border-red">

      <div class="col-md-7 p-5 bg-white rounded-start-5 rounded-end-5">

        <h5 class="fw-bold mb-4">Patient Information</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control input-style" placeholder="example1">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control input-style" placeholder="example1">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control input-style" placeholder="example@gmail.com">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control input-style" placeholder="...">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Test Type</label>
          <select class="form-select input-style w-100" style="background-color: #f5f7fa;">
            <option selected disabled>select a test type</option>
            <option>Blood Test</option>
            <option>Urine Test</option>
            <option>X-Ray</option>
          </select>
        </div>

        <div class="mb-4 mt-4">
          <label class="form-label">Gender</label><br>

          <div class="form-check form-check-inline me-3">
            <input class="form-check-input" type="radio" name="gender" checked>
            <label class="form-check-label">Male</label>
          </div>

          <div class="form-check form-check-inline me-3">
            <input class="form-check-input" type="radio" name="gender">
            <label class="form-check-label">Female</label>
          </div>

          <div class="form-check form-check-inline me-3">
            <input class="form-check-input" type="radio" name="gender">
            <label class="form-check-label">Animal</label>
          </div>
        </div>


      </div>

      <div class="col-md-5 mt-3 mt-md-5 d-flex justify-content-center rounded-end-5">
        <div >
          <img src="images/add-patient.png"
          class=""
          style="width:300px;height:390px;border-radius:12px;object-fit: cover;"
          alt="patient form">

          <div class="d-flex justify-content-center gap-4 mt-4 mb-5">
            <button class="btn btn-light">Cancel</button>
            <button class="btn btn-primary px-4">Save</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
