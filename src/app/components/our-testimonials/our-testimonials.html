<section class="testimonials text-center py-5" style="background-color: #D9EBFF;">
  <div class="container">

    <h5 class="text-primary fw-bold">Our Testimonials</h5>
    <p class="text-muted mb-5">
      A comprehensive ecosystem of laboratory precision tailored for your health.
    </p>

    <div class="position-relative">

      <button class="arrow left" (click)="prev()">‹</button>
      <button class="arrow right" (click)="next()">›</button>

      <div class="cards-wrapper">

        <div
          class="card-item"
          *ngFor="let item of testimonials; let i = index"
          [ngClass]="{
            'active': i === currentIndex,
            'prev': i === getPrevIndex(),
            'next': i === getNextIndex()
          }"
        >
          <div class="card">
            <div class="stars">★ ★ ★ ★ ☆</div>
            <p>{{ item.text }}</p>
            <h6>{{ item.name }}</h6>
          </div>
        </div>

      </div>

    </div>

  </div>
</section>
