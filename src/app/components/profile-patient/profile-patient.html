<div class="profile-wrapper mt-5">

<div class="avatar-section">

  <div class="avatar-ring mb-4">
    <img
      class="avatar-img"
      [src]="patientPhotoUrl"
      alt=""
    />
  </div>

</div>

  <div class="info-card">

    <div class="info-card-header">

      <span class="info-card-title">
        Personal Info
      </span>

      <button
        class="edit-btn"
        (click)="toggleEdit()"
      >

        {{ isEditing ? 'Cancel' : 'Edit' }}

        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
          />

          <path
            d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
          />
        </svg>

      </button>

    </div>

    <div class="info-grid">

      <div class="info-field">

        <span class="field-label">
          First Name
        </span>

        <span
          class="field-value"
          *ngIf="!isEditing"
        >
          {{ patient?.firstName || '—' }}
        </span>

        <input
          class="edit-input"
          *ngIf="isEditing"
          [(ngModel)]="editForm.firstName"
          placeholder="First Name"
        />

      </div>

      <div class="info-field">

        <span class="field-label">
          Last Name
        </span>

        <span
          class="field-value"
          *ngIf="!isEditing"
        >
          {{ patient?.lastName || '—' }}
        </span>

        <input
          class="edit-input"
          *ngIf="isEditing"
          [(ngModel)]="editForm.lastName"
          placeholder="Last Name"
        />

      </div>

      <div class="info-field">

        <span class="field-label">
          Email
        </span>

        <span
          class="field-value"
          *ngIf="!isEditing"
        >
          {{ patient?.email || '—' }}
        </span>

        <input
          class="edit-input"
          *ngIf="isEditing"
          [(ngModel)]="editForm.email"
          type="email"
          placeholder="Email"
        />

      </div>

      <div class="info-field">

        <span class="field-label">
          Phone
        </span>

        <span
          class="field-value"
          *ngIf="!isEditing"
        >
          {{ patient?.phone || '—' }}
        </span>

        <input
          class="edit-input"
          *ngIf="isEditing"
          [(ngModel)]="editForm.phone"
          placeholder="Phone"
        />

      </div>

      <div class="info-field full-width">

        <span class="field-label">
          Location
        </span>

        <span
          class="field-value"
          *ngIf="!isEditing"
        >
          {{ patient?.location || '—' }}
        </span>

        <input
          class="edit-input w-100"
          *ngIf="isEditing"
          type="text"
          [(ngModel)]="locationValue"
          placeholder="Enter location..."
        />

      </div>

    </div>


    <div
      class="edit-actions"
      *ngIf="isEditing"
    >

      <button
        class="save-btn-info"
        (click)="saveEdit()"
      >
        Save Changes
      </button>

    </div>

  </div>

</div>
