<div class="shell" [class.shell--collapsed]="!sidebarOpen()">

  <!-- ══════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════ -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="sidebar__logo">
      <div class="logo-icon">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="2" />
          <path d="M10 18h4l2-6 4 12 2-6h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </div>
      <span class="logo-text">EL-NOUR LAB</span>
    </div>

    <!-- Role badge -->
    <div class="sidebar__role">
      <span class="role-badge" [ngClass]="roleBadgeClass()">
        {{ roleLabel() }}
      </span>
    </div>

    <div class="sidebar__divider"></div>

    <!-- Navigation -->
    <nav class="sidebar__nav">
      <a *ngFor="let item of navItems()" [routerLink]="item.route" routerLinkActive="nav-item--active" class="nav-item"
        [attr.title]="item.label">

        <span class="nav-item__icon">
          <ng-container [ngSwitch]="item.icon">

            <svg *ngSwitchCase="'grid'" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>

            <svg *ngSwitchCase="'user'" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>

            <svg *ngSwitchCase="'users'" viewBox="0 0 24 24">
              <circle cx="9" cy="8" r="3" />
              <path d="M2 20c0-3 3-5.5 7-5.5s7 2.5 7 5.5" />
              <circle cx="17" cy="8" r="3" />
              <path d="M22 20c0-3-2.5-5.5-6-5.5" />
            </svg>

            <svg *ngSwitchCase="'heart'" viewBox="0 0 24 24">
              <path d="M3 12h4l2-6 4 12 2-6h4" />
              <path d="M20.8 14a8 8 0 1 0-13.6 0" />
            </svg>

            <svg *ngSwitchCase="'flask'" viewBox="0 0 24 24">
              <path d="M10 2v7.31L6.27 17a4 4 0 0 0 3.43 6h4.6a4 4 0 0 0 3.43-6L14 9.31V2" />
              <path d="M8.5 2h7" />
              <path d="M7 16h10" />
            </svg>

            <svg *ngSwitchCase="'calendar'" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
              <path d="m9 16 2 2 4-4" />
            </svg>

            <svg *ngSwitchCase="'settings'" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                       a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                       A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                       l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                       A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                       l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                       a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                       l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                       a1.65 1.65 0 0 0-1.51 1z" />
            </svg>

            <svg *ngSwitchCase="'file'" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>

          </ng-container>
        </span>

        <span class="nav-item__label">{{ item.label }}</span>
        <span class="nav-item__pill"></span>
      </a>
    </nav>

    <div class="sidebar__spacer"></div>

    <!-- Logout -->
    <button class="sidebar__logout" (click)="logout()" title="Log Out">
      <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      <span class="sidebar__logout-label">Log Out</span>
    </button>

  </aside>

  <!-- ══════════════════════════════════════
       MAIN AREA
  ═══════════════════════════════════════ -->
  <div class="main">

    <!-- NAVBAR -->
    <header class="navbar">

      <!-- Sidebar toggle -->
      <button class="navbar__toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <!-- Search -->
      <div class="navbar__search">
        <svg class="search-icon" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input type="text" placeholder="Search by patient name, ID..."  (input)="onSearch($event)"/>
      </div>

      <!-- Right: notifications + user -->
      <div class="navbar__right">

        <button class="navbar__icon-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="notif-badge" *ngIf="notifCount() > 0">{{ notifCount() }}</span>
        </button>

        <div class="navbar__user" *ngIf="currentUser() as user">
          <div class="user-avatar">
            <img *ngIf="user.avatar" [src]="user.avatar" [alt]="user.name" />
            <span *ngIf="!user.avatar">{{ userInitial() }}</span>
          </div>
          <div class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-role">{{ roleLabel() }}</span>
          </div>
        </div>

      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
